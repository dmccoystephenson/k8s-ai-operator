services:
  postgres:
    image: postgres:16
    container_name: k8s-ai-operator-db
    environment:
      POSTGRES_DB: k8s_audit
      POSTGRES_USER: operator
      POSTGRES_PASSWORD: operator
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U operator -d k8s_audit"]
      interval: 10s
      timeout: 5s
      retries: 5
