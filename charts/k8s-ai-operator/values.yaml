# Default values for k8s-ai-operator.
# Override these values with -f <file> or --set key=value at install/upgrade time.

replicaCount: 1

image:
  repository: k8s-ai-operator
  pullPolicy: IfNotPresent
  # Overrides the image tag; defaults to the chart appVersion when blank.
  tag: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  # Create a dedicated ServiceAccount for the operator pod.
  create: true
  # Annotations added to the ServiceAccount (e.g. for IRSA).
  annotations: {}
  # Name of the ServiceAccount; auto-generated from the chart name when empty.
  name: ""

podAnnotations: {}

podSecurityContext: {}

securityContext: {}

service:
  type: ClusterIP
  port: 80
  targetPort: 8080

resources:
  requests:
    cpu: "250m"
    memory: "512Mi"
  limits:
    cpu: "500m"
    memory: "1Gi"

# AWS configuration — values are injected into the pod via a ConfigMap.
aws:
  region: "us-east-2"
  bedrock:
    modelId: "anthropic.claude-3-sonnet-20240229-v1:0"
    maxTokens: "512"
  dynamodb:
    tableName: "K8sAgentExecutions"
  cloudwatch:
    namespace: "K8sAiOperator/Execution"

# Spring Boot active profile (set to "lambda" when running on Lambda).
springProfilesActive: ""

# Liveness and readiness probe configuration.
probes:
  liveness:
    path: /actuator/health
    port: 8080
    initialDelaySeconds: 40
    periodSeconds: 30
  readiness:
    path: /actuator/health
    port: 8080
    initialDelaySeconds: 20
    periodSeconds: 10

nodeSelector: {}

tolerations: []

affinity: {}
